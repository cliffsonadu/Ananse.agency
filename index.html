<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --red:    #8b1a1a;
  --red-dk: #5a0f0f;
  --cream:  #ede8df;
  --black:  #070707;
  --serif:  'Cormorant Garamond', serif;
  --sans:   'DM Sans', sans-serif;
}

html, body {
  width:100%; height:100%;
  background: var(--black);
  overflow: hidden;
  font-family: var(--sans);
  color: var(--cream);
  cursor: none;
}

/* ── CURSOR ── */
.cursor-dot {
  position:fixed; width:6px; height:6px;
  background:var(--red); border-radius:50%;
  pointer-events:none; z-index:9999;
  transform:translate(-50%,-50%);
  will-change:left,top;
}
.cursor-ring {
  position:fixed; width:34px; height:34px;
  border:0.5px solid rgba(139,26,26,0.6);
  border-radius:50%; pointer-events:none; z-index:9998;
  transform:translate(-50%,-50%);
  transition:width 0.3s, height 0.3s, border-color 0.3s;
  transition-timing-function:cubic-bezier(0.25,0.46,0.45,0.94);
  will-change:left,top;
}

/* ── CANVAS — cinematic drifting logo ── */
canvas {
  position:fixed; inset:0; z-index:0;
  opacity:0; animation:fadeC 3s 0.3s ease forwards;
}
@keyframes fadeC { to { opacity:1; } }

/* ── DEEP CENTRE VIGNETTE — keeps text readable ── */
.vignette {
  position:fixed; inset:0; z-index:1; pointer-events:none;
  background: radial-gradient(
    ellipse 60% 65% at 50% 50%,
    rgba(7,7,7,0.82)  0%,
    rgba(7,7,7,0.5)  45%,
    rgba(7,7,7,0.0)  75%
  );
}

/* ── GRAIN ── */
.grain {
  position:fixed; inset:0; z-index:2; pointer-events:none; opacity:0.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
}

/* ── WRAP ── */
.wrap {
  position:relative; z-index:10;
  width:100%; min-height:100vh;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:3rem 2rem 3rem;
  text-align:center;
  overflow-y:auto;
}

/* ── HERO LOGO ── */
.logo-mark {
  width:76px; height:auto;
  margin:0 auto 2.8rem;
  opacity:0; transform:translateY(22px);
  animation:riseIn 1.4s 1.2s cubic-bezier(0.25,0.46,0.45,0.94) forwards,
            breathe 3s 2.6s ease-in-out infinite;
  filter: drop-shadow(0 0 24px rgba(139,26,26,0.4));
}
@keyframes breathe {
  0%,100% { transform:scale(1);    filter:drop-shadow(0 0 18px rgba(139,26,26,0.3)); }
  50%      { transform:scale(1.12); filter:drop-shadow(0 0 32px rgba(139,26,26,0.6)); }
}

/* ── EYEBROW ── */
.eyebrow {
  font-size:9px; letter-spacing:0.36em; text-transform:uppercase;
  color:var(--red); margin-bottom:2rem;
  display:flex; align-items:center; justify-content:center; gap:14px;
  opacity:0; animation:riseIn 1s 1.8s forwards;
}
.eyebrow::before, .eyebrow::after {
  content:''; display:inline-block;
  width:24px; height:0.5px; background:var(--red);
}

/* ── HEADLINE ── */
.headline {
  font-family:var(--serif);
  font-size:clamp(2.4rem, 5.5vw, 4.2rem);
  font-weight:300; line-height:1.08;
  color:var(--cream); margin-bottom:1.6rem;
  opacity:0; animation:riseIn 1s 2.1s forwards;
}
.headline em { font-style:italic; color:rgba(237,232,223,0.25); display:block; }


/* ── SUBLINE ── */
.subline {
  font-size:12px; letter-spacing:0.06em;
  color:rgba(237,232,223,0.72); font-weight:300;
  line-height:1.9; margin-bottom:2.8rem; max-width:380px;
  opacity:0; animation:riseIn 1s 2.4s forwards;
}

/* ── THREAD DIVIDER ── */
.thread-wrap {
  display:flex; align-items:center; justify-content:center;
  gap:0; margin-bottom:2.8rem;
  width:100%; max-width:440px;
  opacity:0; animation:riseIn 1s 2.6s forwards;
}
.thread-node { width:4px; height:4px; border-radius:50%; background:var(--red); flex-shrink:0; }
.thread-line {
  height:0.5px; flex:1;
  background:linear-gradient(to right, var(--red), rgba(139,26,26,0.05));
  transform:scaleX(0); transform-origin:left;
  animation:drawLine 1.8s 3.1s cubic-bezier(0.77,0,0.18,1) forwards;
}
.thread-line.rev {
  background:linear-gradient(to left, var(--red), rgba(139,26,26,0.05));
  transform-origin:right;
  animation:drawLineRev 1.8s 3.1s cubic-bezier(0.77,0,0.18,1) forwards;
}
.thread-center {
  font-family:var(--serif); font-size:10px;
  letter-spacing:0.28em; text-transform:uppercase;
  color:rgba(237,232,223,0.2); padding:0 1.4rem; white-space:nowrap;
}

/* ── NOTIFY ── */
.notify { opacity:0; animation:riseIn 1s 2.9s forwards; margin-bottom:2.4rem; }
.notify-label {
  font-size:8px; letter-spacing:0.3em; text-transform:uppercase;
  color:rgba(237,232,223,0.65); margin-bottom:1rem;
}
.notify-form {
  display:flex; gap:0;
  border:0.5px solid rgba(237,232,223,0.28);
  max-width:360px; margin:0 auto; transition:border-color 0.4s;
}
.notify-form:focus-within { border-color:rgba(139,26,26,0.5); }
.notify-input {
  flex:1; background:transparent; border:none; outline:none;
  padding:0.85rem 1.2rem; font-size:12px; color:var(--cream);
  font-family:var(--sans); letter-spacing:0.04em;
}
.notify-input::placeholder { color:rgba(237,232,223,0.45); }
.notify-btn {
  background:transparent; border:none;
  border-left:0.5px solid rgba(237,232,223,0.28);
  padding:0.85rem 1.4rem; cursor:none;
  color:rgba(237,232,223,0.65);
  font-size:8px; letter-spacing:0.24em; text-transform:uppercase;
  font-family:var(--sans); transition:color 0.3s, background 0.3s; white-space:nowrap;
}
.notify-btn:hover { color:var(--cream); background:rgba(139,26,26,0.15); }

/* ── SOCIALS ── */
.socials {
  display:flex; align-items:center; justify-content:center; gap:1.8rem;
  opacity:0; animation:riseIn 1s 3.2s forwards;
  margin-bottom:4rem;
}
.social-link {
  font-size:9px; letter-spacing:0.2em; text-transform:uppercase;
  color:rgba(237,232,223,0.6); text-decoration:none;
  transition:color 0.3s; cursor:none;
}
.social-link:hover { color:var(--cream); }
.social-dot { width:2px; height:2px; border-radius:50%; background:rgba(237,232,223,0.35); }

/* ── FOOTER ── */
.footer-sig {
  font-size:8px; letter-spacing:0.3em; text-transform:uppercase;
  color:rgba(237,232,223,0.4); text-align:center;
  opacity:0; animation:riseIn 1s 3.6s forwards;
}

/* ── KEYFRAMES ── */
@keyframes riseIn {
  from { opacity:0; transform:translateY(18px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes drawLine    { from{transform:scaleX(0);} to{transform:scaleX(1);} }
@keyframes drawLineRev { from{transform:scaleX(0);} to{transform:scaleX(1);} }

/* ── MOBILE ── */
@media (max-width:480px) {
  .logo-mark { width:58px; margin-bottom:2rem; }
  .headline  { font-size:2.2rem; }
  .subline   { font-size:11px; }
  .thread-center { font-size:9px; letter-spacing:0.14em; padding:0 0.7rem; }
  .notify-form   { max-width:100%; }
  .socials       { gap:1rem; flex-wrap:wrap; }
}
</style>
</head>
<body>

<div class="cursor-dot" id="cd"></div>
<div class="cursor-ring" id="cr"></div>
<canvas id="bg"></canvas>
<div class="vignette"></div>
<div class="grain"></div>

<div class="wrap">

  <svg class="logo-mark" viewBox="0 0 566.8 336.54" xmlns="http://www.w3.org/2000/svg">
    <path fill="#f1ede2" d="M289,102.15a5.74,5.74,0,0,1-5.55,4.12h-.09a5.75,5.75,0,0,1-5.55-4.12A141.72,141.72,0,0,0,0,141.7H53.14A88.56,88.56,0,0,1,230,134.61a6.67,6.67,0,0,1-.85,3.71l0,.05a6.48,6.48,0,0,1-5.68,3.33H141.7A141.7,141.7,0,0,0,0,283.4H53.14a88.56,88.56,0,0,1,88.56-88.56h81.71a6.48,6.48,0,0,1,5.68,3.32l0,.05a6.7,6.7,0,0,1,.85,3.71A88.56,88.56,0,0,1,141.7,283.4v53.14A141.76,141.76,0,0,0,277.8,234.38a5.77,5.77,0,0,1,5.55-4.12h.09a5.76,5.76,0,0,1,5.55,4.12A141.72,141.72,0,0,0,566.8,194.84H513.66A88.56,88.56,0,0,1,336.84,202a6.81,6.81,0,0,1,.84-3.82v0a6.51,6.51,0,0,1,5.69-3.35H425.1A141.7,141.7,0,0,0,566.8,53.14H513.66A88.56,88.56,0,0,1,425.1,141.7H343.38a6.48,6.48,0,0,1-5.67-3.33l0-.05a6.5,6.5,0,0,1-.85-3.71A88.56,88.56,0,0,1,425.1,53.14V0A141.77,141.77,0,0,0,289,102.15Z"/>
  </svg>

  <div class="eyebrow">Warsaw &middot; Worldwide</div>

  <h1 class="headline">
    Weaving our world.<br>
    <em>Coming soon.</em>
  </h1>

  <p class="subline">
    Anansé Creative Haus is a premium production house<br>
    built on the art of visual storytelling. We're almost ready.
  </p>

  <div class="thread-wrap">
    <div class="thread-node"></div>
    <div class="thread-line rev"></div>
    <span class="thread-center">The web is being spun</span>
    <div class="thread-line"></div>
    <div class="thread-node"></div>
  </div>

  <div class="notify">
    <div class="notify-label">Be the first to know</div>
    <div class="notify-form">
      <input class="notify-input" type="email" id="emailInput" placeholder="your@email.com" autocomplete="email">
      <button class="notify-btn" id="notifyBtn">Notify me</button>

  <div class="socials">
    <a href="https://instagram.com/ananse.creative" target="_blank" rel="noopener" class="social-link">@ananse.creative</a>
    <div class="social-dot"></div>
    <a href="mailto:info@ananse.agency" class="social-link">info@ananse.agency</a>
  </div>

  <div class="footer-sig">© 2025 Anansé Creative Haus — Warsaw, Poland</div>

</div>

<script>
/* ── CURSOR ── */
const cd = document.getElementById('cd');
const cr = document.getElementById('cr');
let mx = innerWidth/2, my = innerHeight/2, rx = mx, ry = my;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cd.style.left = mx+'px'; cd.style.top = my+'px';
});
(function loop() {
  rx += (mx-rx)*0.12; ry += (my-ry)*0.12;
  cr.style.left = rx+'px'; cr.style.top = ry+'px';
  requestAnimationFrame(loop);
})();
document.querySelectorAll('a,button,input').forEach(el => {
  el.addEventListener('mouseenter', () => { cr.style.width='50px'; cr.style.height='50px'; cr.style.borderColor='rgba(139,26,26,0.9)'; });
  el.addEventListener('mouseleave', () => { cr.style.width='34px'; cr.style.height='34px'; cr.style.borderColor='rgba(139,26,26,0.6)'; });
});

/* ── CINEMATIC LOGO BACKGROUND ── */
const canvas = document.getElementById('bg');
const ctx    = canvas.getContext('2d');

/*
  Strategy: render one massive instance of the logo mark, scaled to ~3× screen size.
  Slowly pan/drift its position so only a portion of the curves are visible at any time —
  exactly like your IG banners where you see sweeping organic arcs moving through frame.
  Two instances offset from each other give depth and layering.
*/

const PATH_DATA = 'M289,102.15a5.74,5.74,0,0,1-5.55,4.12h-.09a5.75,5.75,0,0,1-5.55-4.12A141.72,141.72,0,0,0,0,141.7H53.14A88.56,88.56,0,0,1,230,134.61a6.67,6.67,0,0,1-.85,3.71l0,.05a6.48,6.48,0,0,1-5.68,3.33H141.7A141.7,141.7,0,0,0,0,283.4H53.14a88.56,88.56,0,0,1,88.56-88.56h81.71a6.48,6.48,0,0,1,5.68,3.32l0,.05a6.7,6.7,0,0,1,.85,3.71A88.56,88.56,0,0,1,141.7,283.4v53.14A141.76,141.76,0,0,0,277.8,234.38a5.77,5.77,0,0,1,5.55-4.12h.09a5.76,5.76,0,0,1,5.55,4.12A141.72,141.72,0,0,0,566.8,194.84H513.66A88.56,88.56,0,0,1,336.84,202a6.81,6.81,0,0,1,.84-3.82v0a6.51,6.51,0,0,1,5.69-3.35H425.1A141.7,141.7,0,0,0,566.8,53.14H513.66A88.56,88.56,0,0,1,425.1,141.7H343.38a6.48,6.48,0,0,1-5.67-3.33l0-.05a6.5,6.5,0,0,1-.85-3.71A88.56,88.56,0,0,1,425.1,53.14V0A141.77,141.77,0,0,0,289,102.15Z';
const LOGO_W = 566.8;
const LOGO_H = 336.54;

let W, H;
let t = 0;

/* Three logo instances — each drifts on its own slow trajectory */
const instances = [
  /* layer 1 — large, slow, deep red, back layer */
  { scaleM: 4.2, speedX: 0.00018, speedY: 0.00011, phaseX: 0,            phaseY: Math.PI*0.3,  alpha: 0.18, color: '#7a1212' },
  /* layer 2 — slightly smaller, medium speed, brighter red, mid layer */
  { scaleM: 3.1, speedX: 0.00024, speedY: 0.00016, phaseX: Math.PI*0.7,  phaseY: Math.PI*1.1,  alpha: 0.22, color: '#9e2020' },
  /* layer 3 — smallest of the three, fastest, accent layer */
  { scaleM: 2.4, speedX: 0.00031, speedY: 0.00021, phaseX: Math.PI*1.4,  phaseY: Math.PI*0.6,  alpha: 0.14, color: '#b03030' },
];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function draw() {
  /* Soft clear — leaves a very faint trail for silkiness */
  ctx.clearRect(0, 0, W, H);

  /* Dark base so colours read as deep red on near-black */
  ctx.fillStyle = '#070707';
  ctx.fillRect(0, 0, W, H);

  t += 1;

  instances.forEach(inst => {
    /* Scale so logo fills > screen */
    const scale = (Math.max(W, H) / Math.max(LOGO_W, LOGO_H)) * inst.scaleM;
    const logoW  = LOGO_W * scale;
    const logoH  = LOGO_H * scale;

    /* Drift range — how far the logo wanders from centre */
    const driftX = (logoW - W) * 0.5;
    const driftY = (logoH - H) * 0.5;

    /* Sine-based position so it glides smoothly back and forth */
    const ox = -driftX + Math.sin(t * inst.speedX + inst.phaseX) * driftX * 0.8;
    const oy = -driftY + Math.sin(t * inst.speedY + inst.phaseY) * driftY * 0.8;

    ctx.save();
    ctx.globalAlpha = inst.alpha;
    ctx.fillStyle   = inst.color;
    ctx.translate(ox, oy);
    ctx.scale(scale, scale);
    ctx.fill(new Path2D(PATH_DATA));
    ctx.restore();
  });

  requestAnimationFrame(draw);
}

resize();
window.addEventListener('resize', resize);
draw();

/* ── NOTIFY ── */
function handleNotify() {
  const input = document.getElementById('emailInput');
  const btn   = document.getElementById('notifyBtn');
  const val   = input.value.trim();
  if (!val || !val.includes('@') || !val.includes('.')) {
    input.style.outline = '0.5px solid rgba(139,26,26,0.7)';
    input.focus(); return;
  }
  input.value = ''; input.style.outline = '';
  input.placeholder = "You're on the list ✦";
  input.style.color  = 'rgba(139,26,26,0.9)';
  btn.textContent    = 'Done ✦';
  btn.style.color    = 'rgba(139,26,26,0.9)';
  setTimeout(() => {
    input.style.color = ''; input.placeholder = 'your@email.com';
    btn.textContent   = 'Notify me'; btn.style.color = '';
  }, 4000);
}
document.getElementById('notifyBtn').addEventListener('click', handleNotify);
document.getElementById('emailInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleNotify();
});
</script>
</body>
